<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할 일 관리</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9f9f9;
      color: #1a1a1a;
      padding: 24px 16px;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
    .container { max-width: 640px; margin: 0 auto; }

    body.dark { background: #0f0f0f; color: #f0f0f0; }
    body.dark .card { background: #1c1c1e; border-color: #2c2c2e; }
    body.dark input, body.dark select { background: #2c2c2e; color: #f0f0f0; border-color: #3a3a3c; }
    body.dark .priority-tab { background: #2c2c2e; color: #aeaeb2; border-color: #3a3a3c; }
    body.dark .priority-tab.active-high { background: #3a1a1a; color: #ff453a; border-color: #ff453a; }
    body.dark .priority-tab.active-mid { background: #3a2a1a; color: #ff9f0a; border-color: #ff9f0a; }
    body.dark .priority-tab.active-low { background: #1a3a1a; color: #30d158; border-color: #30d158; }
    body.dark .filter-btn { background: #2c2c2e; color: #aeaeb2; border-color: #3a3a3c; }
    body.dark .filter-btn.active { background: #f0f0f0; color: #1a1a1a; border-color: #f0f0f0; }
    body.dark .todo-card { background: #1c1c1e; border-color: #2c2c2e; }
    body.dark .todo-title-text { color: #f0f0f0; }
    body.dark .meta-text { color: #aeaeb2; }
    body.dark .meta-text.overdue { color: #ff453a; }
    body.dark .sort-select { background: #2c2c2e; color: #f0f0f0; border-color: #3a3a3c; }
    body.dark .modal-overlay { background: rgba(0,0,0,0.7); }
    body.dark .modal-card { background: #1c1c1e; border-color: #2c2c2e; }
    body.dark .modal-input { background: #2c2c2e; color: #f0f0f0; border-color: #3a3a3c; }
    body.dark .modal-date { background: #2c2c2e; color: #f0f0f0; border-color: #3a3a3c; }
    body.dark .modal-btn.cancel { background: #2c2c2e; color: #f0f0f0; }
    body.dark .action-btn.edit { background: #1c3a5a; color: #0a84ff; }
    body.dark .action-btn.delete { background: #3a1a1a; color: #ff453a; }
    body.dark .bulk-btn.complete { background: #1a3a1a; color: #30d158; }
    body.dark .bulk-btn.delete { background: #3a1a1a; color: #ff453a; }
    body.dark h1 { color: #f0f0f0; }
    body.dark .multi-row { background: #2c2c2e; border-color: #3a3a3c; }
    body.dark .multi-input { background: #1c1c1e; color: #f0f0f0; border-color: #3a3a3c; }
    body.dark .multi-date { background: #1c1c1e; color: #f0f0f0; border-color: #3a3a3c; }
    body.dark .search-input { background: #1c1c1e; color: #f0f0f0; border-color: #3a3a3c; }

    @media (max-width: 480px) {
      body { padding: 16px 12px; }
      .app-title { font-size: 20px; }
      .stat-num { font-size: 22px; }
      .filter-tabs { flex-wrap: wrap; }
      .control-row { flex-direction: column; gap: 8px; align-items: flex-start; }
      .bulk-row { flex-direction: column; }
      .bulk-btn { width: 100%; text-align: center; }
      .multi-row { flex-wrap: wrap; gap: 6px; }
      .multi-input { width: 100% !important; }
      .multi-date { width: 100% !important; }
    }

    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .stat-card { background: white; border-radius: 14px; padding: 14px; text-align: center; border: 1.5px solid #f0f0f0; }
    body.dark .stat-card { background: #1c1c1e; border-color: #2c2c2e; }
    .stat-num { font-size: 26px; font-weight: 700; color: #1a1a1a; letter-spacing: -1px; }
    body.dark .stat-num { color: #f0f0f0; }
    .stat-num.blue { color: #007aff; }
    .stat-num.green { color: #34c759; }
    body.dark .stat-num.blue { color: #0a84ff; }
    body.dark .stat-num.green { color: #30d158; }
    .stat-label { font-size: 11px; color: #8e8e93; margin-top: 2px; font-weight: 500; }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .app-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; color: #1a1a1a; }
    body.dark .app-title { color: #f0f0f0; }
    .dark-btn { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid #e5e5e7; background: white; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    body.dark .dark-btn { background: #2c2c2e; border-color: #3a3a3c; }

    .card { background: white; border-radius: 16px; border: 1.5px solid #f0f0f0; padding: 16px; margin-bottom: 12px; }

    /* ── 검색 ── */
    .search-wrap { position: relative; margin-bottom: 12px; }
    .search-input { width: 100%; padding: 10px 14px 10px 36px; border: 1.5px solid #e5e5e7; border-radius: 10px; font-size: 14px; outline: none; background: white; font-family: inherit; transition: border-color 0.2s; }
    .search-input:focus { border-color: #007aff; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #8e8e93; font-size: 14px; pointer-events: none; }

    /* ── 다중 입력 폼 ── */
    .multi-form { display: flex; flex-direction: column; gap: 8px; }
    .multi-row { display: flex; align-items: center; gap: 6px; background: #f9f9f9; border-radius: 10px; padding: 8px; border: 1.5px solid #f0f0f0; }
    .multi-input { flex: 1; padding: 8px 12px; border: 1.5px solid #e5e5e7; border-radius: 8px; font-size: 14px; outline: none; background: white; font-family: inherit; min-width: 0; transition: border-color 0.2s; }
    .multi-input:focus { border-color: #007aff; }
    .multi-priority { display: flex; gap: 3px; }
.multi-p-btn { width: 28px; height: 28px; border: 1.5px solid transparent; border-radius: 6px; background: transparent; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }    .multi-p-btn.active-high { border-color: #ff3b30; background: #fff2f0; }
    .multi-p-btn.active-mid { border-color: #ff9500; background: #fff8f0; }
    .multi-p-btn.active-low { border-color: #34c759; background: #f0fff4; }
    .multi-date { padding: 7px 8px; border: 1.5px solid #e5e5e7; border-radius: 8px; font-size: 12px; outline: none; background: white; font-family: inherit; color: #1a1a1a; width: 130px; }
    .multi-add-btn { width: 26px; height: 26px; border: none; border-radius: 50%; background: #007aff; color: white; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .multi-remove { width: 26px; height: 26px; border: none; border-radius: 50%; background: #ff3b30; color: white; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .submit-btn { width: 100%; padding: 12px; background: #007aff; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 4px; transition: background 0.2s; }
    .submit-btn:hover { background: #0066d6; }
    .date-error { color: #ff3b30; font-size: 12px; display: none; margin-top: -4px; }

    /* ── 우선순위 탭 ── */
    .priority-tabs { display: flex; gap: 6px; }
    .priority-tab { flex: 1; padding: 8px; border: 1.5px solid #e5e5e7; border-radius: 10px; background: white; cursor: pointer; font-size: 14px; font-weight: 500; text-align: center; transition: all 0.15s; font-family: inherit; }
    .priority-tab.active-high { border-color: #ff3b30; background: #fff2f0; color: #ff3b30; }
    .priority-tab.active-mid { border-color: #ff9500; background: #fff8f0; color: #ff9500; }
    .priority-tab.active-low { border-color: #34c759; background: #f0fff4; color: #34c759; }

    .control-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .filter-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
    .filter-btn { padding: 6px 12px; border: 1.5px solid #e5e5e7; border-radius: 20px; background: white; cursor: pointer; font-size: 12px; font-weight: 500; color: #8e8e93; transition: all 0.15s; font-family: inherit; }
    .filter-btn.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }
    body.dark .filter-btn.active { background: #f0f0f0; color: #1a1a1a; border-color: #f0f0f0; }
    .sort-select { padding: 6px 10px; border: 1.5px solid #e5e5e7; border-radius: 20px; font-size: 12px; background: white; cursor: pointer; outline: none; font-family: inherit; color: #8e8e93; }

    .bulk-row { display: flex; justify-content: flex-end; gap: 6px; margin-bottom: 12px; }
    .bulk-btn { padding: 6px 12px; border-radius: 8px; border: none; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; transition: opacity 0.2s; }
    .bulk-btn:hover { opacity: 0.8; }
    .bulk-btn.complete { background: #e8f5e9; color: #34c759; }
    .bulk-btn.delete { background: #fff2f0; color: #ff3b30; }

    .todo-card { background: white; border-radius: 12px; border: 1.5px solid #f0f0f0; padding: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; transition: border-color 0.2s, box-shadow 0.2s; }
    .todo-card:hover { border-color: #e0e0e0; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .todo-card.overdue { border-left: 3px solid #ff3b30; }
    .todo-card.completed { opacity: 0.5; }
    .todo-card.completed .todo-title-text { text-decoration: line-through; }
    .todo-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #d1d1d6; background: white; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .todo-check.checked { background: #34c759; border-color: #34c759; }
    .todo-check.checked::after { content: '✓'; color: white; font-size: 11px; font-weight: 700; }
    body.dark .todo-check { background: #2c2c2e; border-color: #48484a; }
    .todo-content { flex: 1; min-width: 0; }
    .todo-title-text { font-size: 15px; font-weight: 500; color: #1a1a1a; display: block; }
    .todo-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
    .meta-text { font-size: 12px; color: #8e8e93; }
    .meta-text.overdue { color: #ff3b30; }
    .priority-badge { padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
    .priority-badge.high { background: #fff2f0; color: #ff3b30; }
    .priority-badge.mid { background: #fff8f0; color: #ff9500; }
    .priority-badge.low { background: #f0fff4; color: #34c759; }
    body.dark .priority-badge.high { background: #3a1a1a; color: #ff453a; }
    body.dark .priority-badge.mid { background: #3a2a1a; color: #ff9f0a; }
    body.dark .priority-badge.low { background: #1a3a1a; color: #30d158; }
    .todo-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .action-btn { padding: 5px 10px; border-radius: 7px; border: none; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; transition: opacity 0.2s; }
    .action-btn:hover { opacity: 0.8; }
    .action-btn.edit { background: #f0f4ff; color: #007aff; }
    .action-btn.done { background: #f0fff4; color: #34c759; }
.action-btn.done-active { background: #34c759; color: white; }
body.dark .action-btn.done { background: #1a3a1a; color: #30d158; }
body.dark .action-btn.done-active { background: #30d158; color: white; }
    .action-btn.delete { background: #fff2f0; color: #ff3b30; }
    .empty-state { text-align: center; padding: 48px 0; color: #8e8e93; }
    .empty-icon { font-size: 40px; margin-bottom: 8px; }
    .empty-text { font-size: 15px; font-weight: 500; }
    .empty-sub { font-size: 13px; margin-top: 4px; }

    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.show { display: flex; }
    .modal-card { background: white; border-radius: 20px; padding: 24px; width: 100%; max-width: 400px; border: 1.5px solid #f0f0f0; }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
    .modal-input { width: 100%; padding: 11px 14px; border: 1.5px solid #e5e5e7; border-radius: 10px; font-size: 15px; outline: none; background: white; margin-bottom: 10px; font-family: inherit; transition: border-color 0.2s; }
    .modal-input:focus { border-color: #007aff; }
    .modal-date { width: 100%; padding: 10px 14px; border: 1.5px solid #e5e5e7; border-radius: 10px; font-size: 14px; outline: none; background: white; margin-bottom: 14px; font-family: inherit; color: #1a1a1a; }
    .modal-btns { display: flex; gap: 8px; }
    .modal-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity 0.2s; }
    .modal-btn:hover { opacity: 0.85; }
    .modal-btn.cancel { background: #f2f2f7; color: #1a1a1a; }
    .modal-btn.save { background: #007aff; color: white; }
    body.dark .modal-btn.cancel { background: #2c2c2e; color: #f0f0f0; }
  </style>
</head>
<body>
<div class="container">

<div class="header">
    <span class="app-title">할 일</span>
    <div style="display:flex; gap:8px; align-items:center;">
      <button class="dark-btn" onclick="TodoController.showHelp()" style="font-size:14px;">?</button>
      <button class="dark-btn" id="darkBtn" onclick="TodoController.toggleDark()">🌙</button>
    </div>
  </div>
  <div class="stats">
    <div class="stat-card">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">전체</div>
    </div>
    <div class="stat-card">
      <div class="stat-num blue" id="statActive">0</div>
      <div class="stat-label">진행중</div>
    </div>
    <div class="stat-card">
      <div class="stat-num green" id="statCompleted">0</div>
      <div class="stat-label">완료</div>
    </div>
  </div>

  <!-- 입력 폼 -->
  <div class="card">
    <div id="multiRows" class="multi-form"></div>
    <p class="date-error" id="dateError">오늘 날짜부터 선택해주세요</p>
    <button class="submit-btn" onclick="TodoController.submitAll()">추가하기</button>
  </div>

  <!-- 검색 -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="할 일 검색...">
  </div>

  <div class="control-row">
    <div class="filter-tabs">
      <button class="filter-btn active" onclick="TodoController.filterTodos('all', this)">전체</button>
      <button class="filter-btn" onclick="TodoController.filterTodos('active', this)">진행중</button>
      <button class="filter-btn" onclick="TodoController.filterTodos('completed', this)">완료</button>
      <button class="filter-btn" onclick="TodoController.filterTodos('today', this)">오늘</button>
      <button class="filter-btn" onclick="TodoController.filterTodos('high', this)">🔴</button>
      <button class="filter-btn" onclick="TodoController.filterTodos('mid', this)">🟡</button>
      <button class="filter-btn" onclick="TodoController.filterTodos('low', this)">🟢</button>
    </div>
    <select class="sort-select" onchange="TodoController.sortTodos(this.value)">
      <option value="default">최신순</option>
      <option value="priority">우선순위순</option>
      <option value="dueDate">마감일순</option>
    </select>
  </div>

  <div class="bulk-row">
    <button class="bulk-btn complete" onclick="TodoController.completeAll()">✓ 전체 완료</button>
    <button class="bulk-btn delete" onclick="TodoController.deleteCompleted()">🗑 완료 삭제</button>
  </div>

  <div id="todoList"></div>
</div>

<!-- 도움말 모달 -->
<div class="modal-overlay" id="helpModal">
  <div class="modal-card">
    <div class="modal-title">📝 사용 방법</div>
    <div style="font-size:14px; line-height:1.8; color:#1a1a1a;">
      <p><b>할 일 추가</b></p>
      <p>· 입력창에 할 일 입력 후 Enter 또는 추가하기 버튼</p>
      <p>· + 버튼으로 여러 개 동시 추가 (최대 5개)</p>
      <br>
      <p><b>우선순위</b></p>
      <p>· 🔴 높음 / 🟡 중간 / 🟢 낮음 선택</p>
      <br>
      <p><b>필터</b></p>
      <p>· 전체 / 진행중 / 완료 / 오늘 / 우선순위별 필터</p>
      <br>
      <p><b>검색</b></p>
      <p>· 검색창에 키워드 입력하면 실시간 검색</p>
      <br>
      <p><b>기타</b></p>
      <p>· 🌙 버튼으로 다크모드 전환</p>
      <p>· 마감일 지난 항목은 빨간색으로 표시</p>
      <p>· 데이터는 브라우저별 자동 저장</p>
    </div>
    <div class="modal-btns" style="margin-top:16px;">
      <button class="modal-btn save" onclick="TodoController.closeHelp()">확인</button>
    </div>
  </div>
</div>

<!-- 수정 모달 -->
<div class="modal-overlay" id="editModal">
  <div class="modal-card">
    <div class="modal-title">할 일 수정</div>
    <input type="text" class="modal-input" id="editInput" placeholder="할 일 제목">
    <div class="priority-tabs" id="editPriorityTabs" style="margin-bottom:10px;">
      <button class="priority-tab" onclick="TodoController.selectEditPriority('high', this)">🔴 높음</button>
      <button class="priority-tab" onclick="TodoController.selectEditPriority('mid', this)">🟡 중간</button>
      <button class="priority-tab" onclick="TodoController.selectEditPriority('low', this)">🟢 낮음</button>
    </div>
    <input type="date" class="modal-date" id="editDueDate">
    <div class="modal-btns" style="margin-top:14px;">
      <button class="modal-btn cancel" onclick="TodoController.closeModal()">취소</button>
      <button class="modal-btn save" onclick="TodoController.saveEdit()">저장</button>
    </div>
  </div>
</div>

<script>
  // ── Model ──────────────────────────────────────────────────
  const TodoModel = {
    todos: JSON.parse(localStorage.getItem('todos') || '[]'),

    save() { localStorage.setItem('todos', JSON.stringify(this.todos)); },

    add(title, priority, dueDate) {
      this.todos.unshift({ id: Date.now(), title, priority, dueDate, completed: false, createdAt: new Date().toISOString() });
      this.save();
    },

    delete(id) { this.todos = this.todos.filter(function(t) { return t.id !== id; }); this.save(); },
    deleteCompleted() { this.todos = this.todos.filter(function(t) { return !t.completed; }); this.save(); },

    toggle(id) {
      const t = this.todos.find(function(t) { return t.id === id; });
      if (t) { t.completed = !t.completed; this.save(); }
    },

    update(id, title, priority, dueDate) {
      const t = this.todos.find(function(t) { return t.id === id; });
      if (t) { t.title = title; t.priority = priority; t.dueDate = dueDate; this.save(); }
    },

    filter(type, keyword) {
      let todos = this.todos;
      if (type === 'active') todos = todos.filter(function(t) { return !t.completed; });
      else if (type === 'completed') todos = todos.filter(function(t) { return t.completed; });
      else if (type === 'today') {
        const today = new Date().toISOString().split('T')[0];
        todos = todos.filter(function(t) { return t.dueDate === today; });
      } else if (type === 'high' || type === 'mid' || type === 'low') {
        todos = todos.filter(function(t) { return t.priority === type; });
      }
      if (keyword && keyword.trim()) {
        const kw = keyword.trim().toLowerCase();
        todos = todos.filter(function(t) { return t.title.toLowerCase().indexOf(kw) !== -1; });
      }
      return todos;
    },

    sort(todos, type) {
      const p = { high: 0, mid: 1, low: 2 };
      if (type === 'priority') return todos.slice().sort(function(a, b) { return p[a.priority] - p[b.priority]; });
      if (type === 'dueDate') return todos.slice().sort(function(a, b) {
        if (!a.dueDate) return 1; if (!b.dueDate) return -1;
        return new Date(a.dueDate) - new Date(b.dueDate);
      });
      return todos;
    },

    isOverdue(dueDate) {
      if (!dueDate) return false;
      const today = new Date(); today.setHours(0,0,0,0);
      return new Date(dueDate) < today;
    },

    getStats() {
      return {
        total: this.todos.length,
        active: this.todos.filter(function(t) { return !t.completed; }).length,
        completed: this.todos.filter(function(t) { return t.completed; }).length
      };
    }
  };

  // ── View ───────────────────────────────────────────────────
  const TodoView = {
    currentFilter: 'all',
    currentSort: 'default',
    currentPage: 1,
    itemsPerPage: 10,

    changePage(page) {
      const keyword = document.getElementById('searchInput').value;
      const todos = TodoModel.sort(TodoModel.filter(this.currentFilter, keyword), this.currentSort);
      const totalPages = Math.ceil(todos.length / this.itemsPerPage);
      if (page < 1 || page > totalPages) return;
      this.currentPage = page;
      this.renderList();
    },

    render() { this.renderStats(); this.renderList(); },

    renderStats() {
      const s = TodoModel.getStats();
      document.getElementById('statTotal').textContent = s.total;
      document.getElementById('statActive').textContent = s.active;
      document.getElementById('statCompleted').textContent = s.completed;
    },

    renderList() {
      const list = document.getElementById('todoList');
      const keyword = document.getElementById('searchInput').value;
      let todos = TodoModel.sort(TodoModel.filter(this.currentFilter, keyword), this.currentSort);

      const totalPages = Math.ceil(todos.length / this.itemsPerPage);
      if (this.currentPage > totalPages) this.currentPage = 1;
      const start = (this.currentPage - 1) * this.itemsPerPage;
      const paginated = todos.slice(start, start + this.itemsPerPage);

      if (!todos.length) {
        const messages = {
          all: { icon: '📝', text: '할 일이 없어요', sub: '새로운 할 일을 추가해보세요' },
          active: { icon: '🎉', text: '진행중인 할 일이 없어요', sub: '모든 할 일을 완료했어요' },
          completed: { icon: '✅', text: '완료된 할 일이 없어요', sub: '할 일을 완료해보세요' },
          today: { icon: '📅', text: '오늘 마감 할 일이 없어요', sub: '오늘 날짜로 할 일을 추가해보세요' },
          high: { icon: '🔴', text: '높음 우선순위 할 일이 없어요', sub: '우선순위를 높음으로 설정해보세요' },
          mid: { icon: '🟡', text: '중간 우선순위 할 일이 없어요', sub: '우선순위를 중간으로 설정해보세요' },
          low: { icon: '🟢', text: '낮음 우선순위 할 일이 없어요', sub: '우선순위를 낮음으로 설정해보세요' }
        };
        const msg = messages[this.currentFilter] || messages['all'];
        list.innerHTML = '<div class="empty-state"><div class="empty-icon">' + msg.icon + '</div><div class="empty-text">' + (keyword ? '"' + keyword + '" 검색 결과가 없어요' : msg.text) + '</div><div class="empty-sub">' + msg.sub + '</div></div>';
        return;
      }

      list.innerHTML = paginated.map(function(todo) {
        const overdue = !todo.completed && TodoModel.isOverdue(todo.dueDate);
        const priorityText = todo.priority === 'high' ? '높음' : todo.priority === 'mid' ? '중간' : '낮음';
        return '<div class="todo-card ' + (todo.completed ? 'completed' : '') + ' ' + (overdue ? 'overdue' : '') + '">' +
          '<div class="todo-check ' + (todo.completed ? 'checked' : '') + '" onclick="TodoController.toggleTodo(' + todo.id + ')"></div>' +
          '<div class="todo-content">' +
            '<span class="todo-title-text">' + todo.title + '</span>' +
            '<div class="todo-meta">' +
              '<span class="priority-badge ' + todo.priority + '">' + priorityText + '</span>' +
              (todo.dueDate ? '<span class="meta-text ' + (overdue ? 'overdue' : '') + '">📅 ' + todo.dueDate + (overdue ? ' 마감초과' : '') + '</span>' : '') +
            '</div>' +
          '</div>' +
          '<div class="todo-actions">' +
'<button class="action-btn ' + (todo.completed ? 'done-active' : 'done') + '" onclick="TodoController.toggleTodo(' + todo.id + ')">' + (todo.completed ? '✓완료' : '완료') + '</button>' +
'<button class="action-btn ' + (todo.completed ? 'done-active' : 'done') + '" onclick="TodoController.toggleTodo(' + todo.id + ')">' + (todo.completed ? '✓완료' : '완료') + '</button>' +
'<button class="action-btn edit" onclick="TodoController.openEdit(' + todo.id + ')">수정</button>' +          '</div>' +
        '</div>';
      }).join('');

      if (totalPages > 1) {
        let pagination = '<div style="display:flex; justify-content:center; align-items:center; gap:8px; margin-top:16px;">';
        pagination += '<button onclick="TodoView.changePage(' + (this.currentPage - 1) + ')" style="padding:6px 12px; border:1.5px solid #e5e5e7; border-radius:8px; background:white; cursor:pointer; font-size:13px;" ' + (this.currentPage === 1 ? 'disabled' : '') + '>이전</button>';
        for (var i = 1; i <= totalPages; i++) {
          pagination += '<button onclick="TodoView.changePage(' + i + ')" style="padding:6px 12px; border:1.5px solid ' + (i === this.currentPage ? '#007aff' : '#e5e5e7') + '; border-radius:8px; background:' + (i === this.currentPage ? '#007aff' : 'white') + '; color:' + (i === this.currentPage ? 'white' : '#1a1a1a') + '; cursor:pointer; font-size:13px;">' + i + '</button>';
        }
        pagination += '<button onclick="TodoView.changePage(' + (this.currentPage + 1) + ')" style="padding:6px 12px; border:1.5px solid #e5e5e7; border-radius:8px; background:white; cursor:pointer; font-size:13px;" ' + (this.currentPage === totalPages ? 'disabled' : '') + '>다음</button>';
        pagination += '</div>';
        list.innerHTML += pagination;
      }
    }
  };

  // ── Controller ─────────────────────────────────────────────
  const TodoController = {
    editingId: null,
    selectedEditPriority: 'mid',
    rows: [],

    init() {
      this.rows = [];
      this.addRow();
    },

    addRow(afterId) {
      if (this.rows.length >= 5) { alert('최대 5개까지 추가할 수 있어요!'); return; }
      const id = Date.now();
      const today = new Date().toISOString().split('T')[0];
      const newRow = { id, priority: 'mid', date: today };
      if (afterId) {
        const idx = this.rows.findIndex(function(r) { return r.id === afterId; });
        this.rows.splice(idx + 1, 0, newRow);
      } else {
        this.rows.push(newRow);
      }
      this.renderRows();
    },

    removeRow(id) {
      if (this.rows.length <= 1) { alert('최소 1개는 있어야 해요!'); return; }
      this.rows = this.rows.filter(function(r) { return r.id !== id; });
      this.renderRows();
    },

    setRowPriority(id, priority) {
      const row = this.rows.find(function(r) { return r.id === id; });
      if (row) row.priority = priority;
      this.renderRows();
    },

    renderRows() {
      const today = new Date().toISOString().split('T')[0];
      const container = document.getElementById('multiRows');
      const isLast = function(idx) { return idx === TodoController.rows.length - 1; };

      container.innerHTML = this.rows.map(function(row, idx) {
        const placeholder = isLast(idx) ? '할 일 입력... (Enter키로 등록)' : '할 일 입력...';
        return '<div class="multi-row" id="row-' + row.id + '">' +
          '<input type="text" class="multi-input" id="multi-title-' + row.id + '" maxlength="50" placeholder="' + placeholder + '">' +
          '<div class="multi-priority">' +
            '<button class="multi-p-btn ' + (row.priority === 'high' ? 'active-high' : '') + '" onclick="TodoController.setRowPriority(' + row.id + ', \'high\')">🔴</button>' +
            '<button class="multi-p-btn ' + (row.priority === 'mid' ? 'active-mid' : '') + '" onclick="TodoController.setRowPriority(' + row.id + ', \'mid\')">🟡</button>' +
            '<button class="multi-p-btn ' + (row.priority === 'low' ? 'active-low' : '') + '" onclick="TodoController.setRowPriority(' + row.id + ', \'low\')">🟢</button>' +
          '</div>' +
          '<input type="date" class="multi-date" id="multi-date-' + row.id + '" value="' + today + '" min="' + today + '">' +
          '<button class="multi-add-btn" onclick="TodoController.addRow(' + row.id + ')" title="아래에 추가">+</button>' +
          '<button class="multi-remove" onclick="TodoController.removeRow(' + row.id + ')" title="삭제">×</button>' +
        '</div>';
      }).join('');

      // 마지막 행 엔터키로 일괄 등록
      const lastRow = this.rows[this.rows.length - 1];
      if (lastRow) {
        const lastInput = document.getElementById('multi-title-' + lastRow.id);
        if (lastInput) {
          lastInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') TodoController.submitAll();
          });
        }
      }
    },

    submitAll() {
      const today = new Date().toISOString().split('T')[0];
      let added = 0;
      this.rows.forEach(function(row) {
        const titleEl = document.getElementById('multi-title-' + row.id);
        const dateEl = document.getElementById('multi-date-' + row.id);
        if (!titleEl) return;
        const title = titleEl.value.trim();
        if (!title) return;
        const dueDate = dateEl ? dateEl.value : today;
        TodoModel.add(title, row.priority, dueDate);
        added++;
      });
      if (added === 0) { alert('할 일을 입력해주세요!'); return; }
      TodoController.init();
      TodoView.render();
    },

    selectEditPriority(priority, btn) {
      this.selectedEditPriority = priority;
      document.querySelectorAll('#editPriorityTabs .priority-tab').forEach(function(b) {
        b.classList.remove('active-high', 'active-mid', 'active-low');
      });
      btn.classList.add('active-' + priority);
    },

    deleteTodo(id) { if (confirm('삭제할까요?')) { TodoModel.delete(id); TodoView.render(); } },

    deleteCompleted() {
      const n = TodoModel.todos.filter(function(t) { return t.completed; }).length;
      if (!n) { alert('완료된 항목이 없어요!'); return; }
      if (confirm(n + '개 항목을 삭제할까요?')) { TodoModel.deleteCompleted(); TodoView.render(); }
    },

    completeAll() {
      const n = TodoModel.todos.filter(function(t) { return !t.completed; }).length;
      if (!n) { alert('모두 완료된 상태예요!'); return; }
      if (confirm(n + '개 항목을 완료 처리할까요?')) {
        TodoModel.todos.forEach(function(t) { t.completed = true; });
        TodoModel.save(); TodoView.render();
      }
    },

    toggleTodo(id) { TodoModel.toggle(id); TodoView.render(); },

    filterTodos(type, btn) {
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      TodoView.currentFilter = type;
      TodoView.currentPage = 1;
      TodoView.render();
    },

    sortTodos(type) { TodoView.currentSort = type; TodoView.render(); },

    openEdit(id) {
      const todo = TodoModel.todos.find(function(t) { return t.id === id; });
      if (!todo) return;
      this.editingId = id;
      this.selectedEditPriority = todo.priority;
      document.getElementById('editInput').value = todo.title;
      const editDueDate = document.getElementById('editDueDate');
      if (editDueDate) editDueDate.value = todo.dueDate || '';
      document.querySelectorAll('#editPriorityTabs .priority-tab').forEach(function(b) {
        b.classList.remove('active-high', 'active-mid', 'active-low');
      });
      var idx = { high: 0, mid: 1, low: 2 };
      document.querySelectorAll('#editPriorityTabs .priority-tab')[idx[todo.priority]].classList.add('active-' + todo.priority);
      document.getElementById('editModal').classList.add('show');
    },

    closeModal() { document.getElementById('editModal').classList.remove('show'); this.editingId = null; },

    saveEdit() {
      const title = document.getElementById('editInput').value.trim();
      if (!title) { alert('할 일을 입력해주세요!'); return; }
      const dueDateVal = document.getElementById('editDueDate');
      TodoModel.update(this.editingId, title, this.selectedEditPriority, dueDateVal ? dueDateVal.value : '');
      this.closeModal(); TodoView.render();
    },

    toggleDark() {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('darkMode', isDark);
      document.getElementById('darkBtn').textContent = isDark ? '☀️' : '🌙';
    },

showHelp() {
  document.getElementById('helpModal').classList.add('show');
},

closeHelp() {
  document.getElementById('helpModal').classList.remove('show');
  localStorage.setItem('helpShown', 'true');
},

  };

  

  // ── 초기화 ─────────────────────────────────────────────────
  TodoController.init();

  document.getElementById('searchInput').addEventListener('input', function() {
    TodoView.currentPage = 1;
    TodoView.render();
  });

  if (localStorage.getItem('darkMode') === 'true') {
    document.body.classList.add('dark');
    document.getElementById('darkBtn').textContent = '☀️';
  }

  // 최초 방문 시 도움말 표시
if (!localStorage.getItem('helpShown')) {
  TodoController.showHelp();
}

  TodoView.render();
</script>
</body>
</html>
